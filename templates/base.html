<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}BookASeat{% endblock %}</title>

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bms-red: #f84464;
      --bms-dark: #1a1a2e;
      --bms-card-bg: #16213e;
      --bms-accent: #0f3460;
      --bms-text: #e0e0e0;
      --bms-muted: #8892a4;
      --bms-border: #2a2a4a;
    }

    * { box-sizing: border-box; }

    body {
      background-color: #0d0d1a;
      color: var(--bms-text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* Navbar */
    .bms-navbar {
      background: linear-gradient(135deg, #1a0a0f 0%, #1a1a2e 60%, #0f3460 100%);
      border-bottom: 1px solid rgba(248,68,100,0.3);
      padding: 0.75rem 0;
      box-shadow: 0 2px 20px rgba(248,68,100,0.15);
    }

    .bms-brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 2px;
      color: var(--bms-red) !important;
      text-decoration: none;
    }

    .bms-brand span { color: #ffffff; }

    .nav-link-bms {
      color: var(--bms-text) !important;
      font-weight: 500;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
      padding: 0.5rem 1rem !important;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .nav-link-bms:hover {
      color: #fff !important;
      background: rgba(248,68,100,0.15);
    }

    .btn-navbar-cta {
      background: var(--bms-red);
      color: #fff !important;
      font-weight: 600;
      font-size: 0.85rem;
      padding: 0.4rem 1.2rem !important;
      border-radius: 6px;
      border: none;
      transition: all 0.2s ease;
    }

    .btn-navbar-cta:hover {
      background: #e03056;
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(248,68,100,0.4);
    }

    /* Page wrapper */
    .page-wrapper { padding: 3rem 0 5rem; }

    /* Section heading */
    .section-heading {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 2px;
      color: #fff;
      margin-bottom: 0.25rem;
    }

    .section-divider {
      width: 60px;
      height: 3px;
      background: var(--bms-red);
      border-radius: 2px;
      margin-bottom: 2rem;
    }

    /* Cards */
    .movie-card {
      background: var(--bms-card-bg);
      border: 1px solid var(--bms-border);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      height: 100%;
    }

    .movie-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 40px rgba(248,68,100,0.25);
      border-color: rgba(248,68,100,0.4);
    }

    /* ── Buttons — inline-flex so they never stretch full width ── */
    .btn-bms-primary {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      background: var(--bms-red);
      color: #fff;
      border: none;
      font-weight: 600;
      letter-spacing: 0.5px;
      border-radius: 8px;
      padding: 0.55rem 1.5rem;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .btn-bms-primary:hover {
      background: #e03056;
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 4px 18px rgba(248,68,100,0.4);
    }

    .btn-bms-outline {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      background: transparent;
      color: var(--bms-red);
      border: 1.5px solid var(--bms-red);
      font-weight: 600;
      border-radius: 8px;
      padding: 0.55rem 1.5rem;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .btn-bms-outline:hover {
      background: var(--bms-red);
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 4px 18px rgba(248,68,100,0.4);
    }

    /* Footer */
    footer {
      background: #0a0a15;
      border-top: 1px solid var(--bms-border);
      padding: 1.5rem 0;
      color: var(--bms-muted);
      font-size: 0.85rem;
      text-align: center;
    }

    footer a {
      color: var(--bms-red);
      text-decoration: none;
    }

    /* Alerts */
    .alert-bms {
      background: rgba(248,68,100,0.1);
      border: 1px solid rgba(248,68,100,0.3);
      color: #ffb3c1;
      border-radius: 8px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d0d1a; }
    ::-webkit-scrollbar-thumb { background: var(--bms-accent); border-radius: 3px; }
  </style>

  {% block extra_css %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100">

  {% include 'partials/navbar.html' %}

  <main class="page-wrapper flex-grow-1">
    <div class="container">
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-bms alert-dismissible fade show mb-3" role="alert">
            <i class="bi bi-info-circle me-2"></i>{{ message }}
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}

      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="mt-auto">
    <p class="mb-0">© 2024 <a href="{% url 'movie_list' %}">BookASeat</a> — Your Cinema Companion</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
