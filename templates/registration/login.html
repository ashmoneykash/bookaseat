{% extends 'base.html' %}

{% block title %}Login — BookASeat{% endblock %}

{% block content %}
<div style="max-width: 420px; margin: 3rem auto;">

  <div style="text-align:center; margin-bottom:2rem;">
    <div style="font-family:'Bebas Neue',sans-serif; font-size:2.5rem; letter-spacing:3px; color:#fff;">
      WELCOME BACK
    </div>
    <p style="color:var(--bms-muted); font-size:0.9rem;">Sign in to continue booking</p>
  </div>

  <div style="background:var(--bms-card-bg); border:1px solid var(--bms-border); border-radius:14px; padding:2rem;">

    {% if form.errors %}
      <div style="background:rgba(248,68,100,0.1); border:1px solid rgba(248,68,100,0.3); color:#ffb3c1; border-radius:8px; padding:0.75rem 1rem; margin-bottom:1.25rem; font-size:0.88rem;">
        <i class="bi bi-exclamation-circle me-2"></i>Invalid username or password.
      </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <div style="margin-bottom:1.25rem;">
        <label style="font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--bms-muted); display:block; margin-bottom:0.4rem;">
          Username
        </label>
        <input type="text" name="username" autofocus required
               style="width:100%; background:#0d0d1a; border:1px solid var(--bms-border); border-radius:8px; color:#fff; padding:0.65rem 1rem; font-size:0.9rem; outline:none; font-family:'DM Sans',sans-serif;"
               onfocus="this.style.borderColor='#f84464'" onblur="this.style.borderColor='var(--bms-border)'" />
      </div>

      <div style="margin-bottom:1.5rem;">
        <label style="font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--bms-muted); display:block; margin-bottom:0.4rem;">
          Password
        </label>
        <input type="password" name="password" required
               style="width:100%; background:#0d0d1a; border:1px solid var(--bms-border); border-radius:8px; color:#fff; padding:0.65rem 1rem; font-size:0.9rem; outline:none; font-family:'DM Sans',sans-serif;"
               onfocus="this.style.borderColor='#f84464'" onblur="this.style.borderColor='var(--bms-border)'" />
      </div>

      <button type="submit"
              style="width:100%; background:#f84464; color:#fff; border:none; border-radius:8px; padding:0.75rem; font-size:0.95rem; font-weight:700; cursor:pointer; letter-spacing:0.5px; transition:background 0.2s;"
              onmouseover="this.style.background='#d93558'" onmouseout="this.style.background='#f84464'">
        <i class="bi bi-box-arrow-in-right me-2"></i>Login
      </button>
    </form>

  </div>
</div>
{% endblock %}
