{% extends "base.html" %}

{% block title %}Select Seats{% endblock %}

{% block content %}
<h2 class="text-center mb-4">Select Your Seats</h2>

<div class="d-flex justify-content-center">
    <div class="seat-grid">
        {% for row in seats %}
        <div class="d-flex justify-content-center mb-2">
            {% for seat in row %}
            <div class="seat
                {% if seat.is_booked %}
                    seat-booked
                {% else %}
                    seat-available
                {% endif %}
            ">
                {{ seat.number }}
            </div>
            {% endfor %}
        </div>
        {% endfor %}
    </div>
</div>

<div class="text-center mt-4">
    <button class="btn btn-success px-4" disabled>
        Confirm Booking
    </button>
</div>

<style>
.seat {
    width: 40px;
    height: 40px;
    margin: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
}

.seat-available {
    background-color: #e9ecef;
    border: 1px solid #adb5bd;
}

.seat-booked {
    background-color: #dc3545;
    color: white;
    cursor: not-allowed;
}
</style>
{% endblock %}
